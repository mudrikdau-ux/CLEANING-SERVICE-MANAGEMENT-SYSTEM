<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking - CSMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/tracking.css">
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- LEFT SIDEBAR -->
    <div class="col-md-3 sidebar">
        <div class="profile text-center">
            <div class="avatar">A</div>
            <h4>ALY</h4>
            <p>Unguja</p>
        </div>

        <ul class="menu">
            <li class="active">My Bookings</li>
            <li>My Quotes</li>
            <li>My Profile</li>
            <li>Outstanding Payments</li>
            <li>Saved Locations</li>
            <li>Payment Methods</li>
            <li>Support</li>
            <li>Settings</li>
            <li>Feedback</li>
            <li>Terms & Conditions</li>
            <li>Delete Account</li>
            <li>Logout</li>
        </ul>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="col-md-9 content">

        <h3>My Bookings</h3>

        <!-- FILTER TABS -->
        <div class="tabs">
            <button class="tab active" data-type="upcoming">Upcoming</button>
            <button class="tab" data-type="delivered">Delivered</button>
            <button class="tab" data-type="cancelled">Cancelled</button>
            <button class="tab" data-type="unpaid">Unpaid</button>
        </div>

        <!-- BOOKINGS DISPLAY -->
        <div id="bookingList" class="booking-box">
            <!-- JS will insert content -->
        </div>

    </div>

</div>
</div>

<script src="js/tracking.js"></script>
</body>
</html>
