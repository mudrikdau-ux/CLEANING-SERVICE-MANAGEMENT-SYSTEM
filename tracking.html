<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CSMS | Smart Booking Dashboard</title>

<!-- External Dependencies -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="css/tracking.css">
</head>
<body>

<div class="dashboard-wrapper">
    <!-- Mobile Overlay -->
    <div class="overlay-blur" id="mobileOverlay"></div>

    <!-- LEFT SIDEBAR - Matching Index Style -->
    <aside class="sidebar" id="mainSidebar">
        <div class="sidebar-header">
            <button class="sidebar-close-btn" id="sidebarCloseBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="profile text-center">
            <div class="avatar">A</div>
            <h4>ALY HASSAN</h4>
            <p><i class="fas fa-map-marker-alt"></i> Unguja, Zanzibar</p>
        </div>

        <ul class="menu" id="sidebarMenu">
            <li data-menu="bookings" class="active"><i class="fas fa-calendar-check"></i> My Bookings</li>
            <li data-menu="quotes"><i class="fas fa-file-alt"></i> My Quotes</li>
            <li data-menu="payments"><i class="fas fa-credit-card"></i> Outstanding Payments</li>
            <li data-menu="locations"><i class="fas fa-map-marker-alt"></i> Saved Locations</li>
            <li data-menu="methods"><i class="fas fa-wallet"></i> Payment Methods</li>
            <li data-menu="support"><i class="fas fa-headset"></i> Support</li>
            <li data-menu="settings"><i class="fas fa-sliders-h"></i> Settings</li>
            <li data-menu="feedback"><i class="fas fa-comment-dots"></i> Feedback</li>
            <li data-menu="terms"><i class="fas fa-file-contract"></i> Terms & Conditions</li>
            <li data-menu="delete"><i class="fas fa-trash-alt"></i> Delete Account</li>
            <li data-menu="logout"><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>
        
        <div class="sidebar-footer">
            <small><i class="fas fa-shield-alt"></i> CSMS v2.0</small>
        </div>
    </aside>

    <!-- RIGHT CONTENT -->
    <main class="content">
        <!-- Top Bar with Hamburger Icon -->
        <div class="top-bar">
            <button class="hamburger-btn" id="hamburgerToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="top-bar-logo">
                <img src="image/logo.jpeg" alt="CSMS Logo" class="logo-small">
                <span>CSMS Dashboard</span>
            </div>
            <div class="top-bar-actions">
                <i class="fas fa-bell" id="notificationIcon"></i>
                <i class="fas fa-envelope" id="messageIcon"></i>
                <a href="index.html" class="home-link"><i class="fas fa-home"></i></a>
            </div>
        </div>

        <!-- Dynamic Content Panel -->
        <div id="dynamicPanel">
            <!-- Content will be loaded dynamically -->
        </div>
    </main>
</div>

<!-- External JavaScript -->
<script src="js/tracking.js"></script>
</body>
</html>
