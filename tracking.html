<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CSMS | Smart Booking Dashboard</title>

<!-- External Dependencies -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="css/tracking.css">
</head>
<body>

<div class="dashboard-wrapper">
    <!-- Mobile Overlay -->
    <div class="overlay-blur" id="mobileOverlay"></div>

    <!-- LEFT SIDEBAR - HAMBURGER COLLAPSIBLE -->
    <aside class="sidebar" id="mainSidebar">
        <div class="sidebar-header">
            <button class="sidebar-close-btn" id="sidebarCloseBtn">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="profile text-center">
            <div class="avatar">A</div>
            <h4>ALY HASSAN</h4>
            <p><i class="bi bi-geo-alt-fill"></i> Unguja, Zanzibar</p>
        </div>

        <ul class="menu" id="sidebarMenu">
            <li data-menu="bookings" class="active"><i class="bi bi-calendar-check-fill"></i> My Bookings</li>
            <li data-menu="quotes"><i class="bi bi-file-text-fill"></i> My Quotes</li>
            <li data-menu="profile"><i class="bi bi-person-circle"></i> My Profile</li>
            <li data-menu="payments"><i class="bi bi-credit-card-2-front"></i> Outstanding Payments</li>
            <li data-menu="locations"><i class="bi bi-geo-alt"></i> Saved Locations</li>
            <li data-menu="methods"><i class="bi bi-wallet2"></i> Payment Methods</li>
            <li data-menu="support"><i class="bi bi-headset"></i> Support</li>
            <li data-menu="settings"><i class="bi bi-sliders2"></i> Settings</li>
            <li data-menu="feedback"><i class="bi bi-chat-dots"></i> Feedback</li>
            <li data-menu="terms"><i class="bi bi-file-earmark-text"></i> Terms & Conditions</li>
            <li data-menu="delete"><i class="bi bi-trash3"></i> Delete Account</li>
            <li data-menu="logout"><i class="bi bi-box-arrow-right"></i> Logout</li>
        </ul>
        
        <div class="sidebar-footer">
            <small><i class="bi bi-shield-check"></i> CSMS v2.0</small>
        </div>
    </aside>

    <!-- RIGHT CONTENT -->
    <main class="content">
        <!-- Top Bar with Hamburger Icon (Always Visible) -->
        <div class="top-bar">
            <button class="hamburger-btn" id="hamburgerToggle">
                <i class="bi bi-list"></i>
            </button>
            <div class="top-bar-logo">
                <i class="bi bi-briefcase-fill text-primary"></i>
                <span>CSMS Dashboard</span>
            </div>
            <div class="top-bar-actions">
                <i class="bi bi-bell"></i>
                <i class="bi bi-envelope"></i>
            </div>
        </div>

        <!-- Dynamic Content Panel -->
        <div id="dynamicPanel">
            <!-- Bookings Section (Default) -->
            <div class="section-header">
                <h1 class="page-title"><i class="bi bi-journal-bookmark-fill text-primary me-2"></i>My Bookings</h1>
            </div>

            <!-- FILTER TABS -->
            <div class="tabs" id="filterTabs">
                <button class="tab active" data-type="upcoming"><i class="bi bi-calendar-week"></i> Upcoming</button>
                <button class="tab" data-type="delivered"><i class="bi bi-truck"></i> Delivered</button>
                <button class="tab" data-type="cancelled"><i class="bi bi-x-circle"></i> Cancelled</button>
                <button class="tab" data-type="unpaid"><i class="bi bi-exclamation-triangle"></i> Unpaid</button>
            </div>

            <!-- BOOKINGS DISPLAY -->
            <div id="bookingList" class="booking-box">
                <!-- JS will insert content -->
            </div>
        </div>
    </main>
</div>

<!-- External JavaScript -->
<script src="js/tracking.js"></script>
</body>
</html>
