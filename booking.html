<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSMS • professional booking</title>
  <!-- Bootstrap 5 (light weight) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 (free) for clean icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/booking.css">
</head>
<body>
<div class="container mt-4">
  <div class="row g-4">
    <!-- LEFT: SUMMARY (professional card) -->
    <div class="col-lg-4 col-md-5">
      <div class="summary-box">
        <h5><i class="fas fa-clipboard-list"></i> Booking summary</h5>
        <div id="summary">
          <!-- dynamic summary populated via js -->
          <div class="summary-item"><span class="label">Cleaners</span><span class="value" id="sumCleaners">—</span></div>
          <div class="summary-item"><span class="label">Hours</span><span class="value" id="sumHours">—</span></div>
          <div class="summary-item"><span class="label">Frequency</span><span class="value" id="sumFreq">—</span></div>
          <div class="summary-item"><span class="label">Materials</span><span class="value" id="sumMaterials">—</span></div>
          <div class="summary-item"><span class="label">Property</span><span class="value" id="sumProperty">—</span></div>
          <div class="summary-item"><span class="label">Date</span><span class="value" id="sumDate">—</span></div>
          <div class="summary-item"><span class="label">Time</span><span class="value" id="sumTime">—</span></div>
          <div class="summary-item"><span class="label">Name</span><span class="value" id="sumName">—</span></div>
          <div class="summary-total">
            <span>Total</span>
            <span id="sumTotal">TZS 0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: MULTI‑PHASE FORM -->
    <div class="col-lg-8 col-md-7">
      <form id="bookingForm" class="phase-container">
        <!-- PHASE 1 – Service details -->
        <div class="phase active" id="phase1">
          <h4><i class="fas fa-broom"></i> Service details</h4>
          <label class="form-label">How many cleaners?</label>
          <input type="number" id="cleaners" class="form-control mb-3" min="1" value="1">

          <label class="form-label">How many hours? (TZS 20,000/hour)</label>
          <input type="number" id="hours" class="form-control mb-3" min="1" value="2">

          <label class="form-label">How often?</label>
          <select id="frequency" class="form-select mb-3">
            <option selected>One time</option>
            <option>Weekly</option>
            <option>Multiple</option>
          </select>

          <label class="form-label">Need materials? (+TZS 10,000)</label>
          <select id="materials" class="form-select mb-3">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>

          <label class="form-label">Special instructions</label>
          <textarea id="instructions" class="form-control mb-4" placeholder="e.g. focus on kitchen, fragile items..."></textarea>

          <button type="button" class="btn btn-primary next" data-next="phase2">Next <i class="fas fa-arrow-right ms-1"></i></button>
        </div>

        <!-- PHASE 2 – Address -->
        <div class="phase" id="phase2">
          <h4><i class="fas fa-map-pin"></i> Address</h4>
          <select id="propertyType" class="form-select mb-3">
            <option value="">Select property type</option>
            <option>Apartment</option>
            <option>Villa</option>
            <option>Office</option>
            <option>Other</option>
          </select>

          <div id="addressFields">
            <input type="text" id="street" class="form-control mb-2" placeholder="Street address">
            <input type="text" id="city" class="form-control mb-2" placeholder="City">
            <input type="text" id="postal" class="form-control mb-2" placeholder="Postal code (optional)">
          </div>

          <button type="button" class="btn btn-primary next" data-next="phase3">Next <i class="fas fa-arrow-right ms-1"></i></button>
        </div>

        <!-- PHASE 3 – Location / map -->
        <div class="phase" id="phase3">
          <h4><i class="fas fa-map-marked-alt"></i> Location</h4>
          <input type="text" id="locationSearch" class="form-control mb-3" placeholder="Search location...">
          <div class="map-box"><i class="fas fa-map"></i> interactive map preview</div>
          <button type="button" class="btn btn-primary next mt-3" data-next="phase4">Next <i class="fas fa-arrow-right ms-1"></i></button>
        </div>

        <!-- PHASE 4 – Date & time -->
        <div class="phase" id="phase4">
          <h4><i class="fas fa-calendar-alt"></i> Date & time</h4>
          <label class="form-label">Preferred date</label>
          <input type="date" id="date" class="form-control mb-3" value="2025-05-20">

          <label class="form-label">Preferred time</label>
          <input type="time" id="time" class="form-control mb-4" value="10:00">

          <button type="button" class="btn btn-primary next" data-next="phase5">Next <i class="fas fa-arrow-right ms-1"></i></button>
        </div>

        <!-- PHASE 5 – Contact info -->
        <div class="phase" id="phase5">
          <h4><i class="fas fa-user-circle"></i> Contact info</h4>
          <input type="text" id="fname" class="form-control mb-3" placeholder="First name" value="John">
          <input type="text" id="lname" class="form-control mb-3" placeholder="Last name" value="Mwangi">
          <input type="email" id="email" class="form-control mb-4" placeholder="Email address" value="john.m@example.com">

          <button type="button" class="btn btn-primary next" data-next="phase6">Review <i class="fas fa-arrow-right ms-1"></i></button>
        </div>

        <!-- PHASE 6 – Review & confirm -->
        <div class="phase" id="phase6">
          <h4><i class="fas fa-check-circle"></i> Review & confirm</h4>
          <div id="review"></div>
          <p class="text-success"><i class="fas fa-tag me-2"></i> 5% discount may apply for long bookings!</p>
          <button type="button" class="btn btn-success next" data-next="phase7">Continue to payment</button>
        </div>

        <!-- PHASE 7 – Payment -->
        <div class="phase" id="phase7">
          <h4><i class="fas fa-credit-card"></i> Payment method</h4>
          <select id="payment" class="form-select mb-4">
            <option selected>Mobile Money</option>
            <option>Bank transfer</option>
            <option>Visa / Mastercard</option>
            <option>Cash (+TZS 5,000)</option>
          </select>

          <button type="submit" class="btn btn-success"><i class="fas fa-lock me-2"></i>Confirm & proceed</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/booking.js"></script>
  
</style>
</body>
</html>
